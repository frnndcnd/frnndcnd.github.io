<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c1810"/>
      <stop offset="50%" stop-color="#4a2c1a"/>
      <stop offset="100%" stop-color="#2c1810"/>
    </linearGradient>
    <filter id="leather" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="5"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.18  0 0 0 0 0.10  0 0 0 0 0.06  0 0 0 0.35 0"/>
      <feBlend mode="overlay" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#cover)"/>
  <g filter="url(#leather)">
    <rect x="60" y="60" width="1480" height="780" rx="12" fill="none" stroke="rgba(255,220,180,0.25)" stroke-width="3"/>
    <rect x="90" y="90" width="1420" height="720" rx="8" fill="none" stroke="rgba(255,220,180,0.12)" stroke-width="1.5"/>
  </g>
  <text x="800" y="380" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" fill="rgba(255,235,205,0.92)" font-weight="400" letter-spacing="0.08em">Álbum de Fotos</text>
  <text x="800" y="460" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="rgba(255,235,205,0.55)" font-style="italic">Recuerdos</text>
  <line x1="580" y1="520" x2="1020" y2="520" stroke="rgba(255,220,180,0.30)" stroke-width="2"/>
  <rect x="20" y="0" width="50" height="900" fill="linear-gradient(90deg, rgba(0,0,0,0.45), rgba(0,0,0,0.15), transparent)"/>
</svg>

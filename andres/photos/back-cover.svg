<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="backcover" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c1810"/>
      <stop offset="50%" stop-color="#4a2c1a"/>
      <stop offset="100%" stop-color="#2c1810"/>
    </linearGradient>
    <filter id="leather2" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="8"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.18  0 0 0 0 0.10  0 0 0 0 0.06  0 0 0 0.35 0"/>
      <feBlend mode="overlay" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#backcover)"/>
  <g filter="url(#leather2)">
    <rect x="60" y="60" width="1480" height="780" rx="12" fill="none" stroke="rgba(255,220,180,0.18)" stroke-width="2"/>
  </g>
  <text x="800" y="820" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="rgba(255,235,205,0.40)" font-style="italic">— Fin —</text>
  <rect x="1530" y="0" width="50" height="900" fill="linear-gradient(270deg, rgba(0,0,0,0.45), rgba(0,0,0,0.15), transparent)"/>
</svg>

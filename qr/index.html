<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator</title>
    <script src="https://unpkg.com/qr-code-styling/lib/qr-code-styling.js"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"
      integrity="sha512-CNgIRecGo7nphbeZ04Sc13ka07paqdeTu0WR1IM4kNcpmBAUSHSQX0FslNhTDadL4O5SAGapGt4FodqL8My0mA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </head>
  <body>
    <h1>QR Code Generator</h1>
    <input id="texto" type="text" placeholder="Escribe tu nombre" />
    <div style="display: flex; margin-top: 20px; gap: 20px">
      <button onclick="generarQR()">Generar QR</button>
      <button onclick="generarQRStyles()">Generar QR Estilizado</button>
    </div>
    <div style="display: flex; margin-top: 20px; gap: 20px">
      <div id="qrCode" style="margin-top: 20px"></div>
      <div id="qrcode"></div>
    </div>

    <script>
      function generarQR() {
        const contenedor = document.getElementById("qrCode");
        contenedor.innerHTML = ""; // limpiar
        new QRCode(contenedor, {
          text: document.getElementById("texto").value,
          width: 200,
          height: 200,
        });
      }
    </script>
    <script>
      function generarQRStyles() {
        const value = document.getElementById("texto").value;
        const contenedor = document.getElementById("qrcode");
        contenedor.innerHTML = ""; // limpiar
        const qrCode = new QRCodeStyling({
          width: 250,
          height: 250,
          data: value,
          image: "./assets/logo.png", // logo al centro
          dotsOptions: {
            // color: "#e74c3c", // color de puntos
            color: "magenta", // color de puntos
            type: "rounded", // square, rounded, dots, classy
          },
          backgroundOptions: {
            // color: "#fdfdfd", // fondo
            color: "yellow", // fondo
          },
          imageOptions: {
            crossOrigin: "anonymous",
            margin: 10,
          },
        });

        qrCode.append(contenedor);
      }
    </script>
  </body>
</html>
